<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Главная - Вкусняшка-няшка</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">

</head>
<body class="page">
    <header class="site-header">  
        <div class="title">
            <h1 class="title-text">Магазин "Токийский дрифт"</h1> 
            <p class="title-des">Магазин японских вкусняшек.</p>
        </div>
    </header> 

    <main>
        <section class="add-product-form">
            <h3>Добавить новый товар</h3>
            <form id="addProductForm">
                <label for="name">Название:</label>
                <input type="text" id="name" required>

                <label for="price">Цена (₽):</label>
                <input type="number" id="price" step="1" min="1" required>

                <label for="description">Описание:</label>
                <textarea id="description" rows="3"></textarea>

                <button type="submit">Добавить товар</button>
            </form>
        </section>

        <section class="products-area">
            <div class="card-header">
                <h3 class="card-title">Наш ассортимент товаров</h3>
            </div>
            <div class="product-container" id="product-container">
                <p>Загрузка товаров...</p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="site-footer__container">
            <nav class="footer-nav" aria-label="Навигация по футеру">
                <ul class="footer-nav__list">
                    <li class="footer-nav__item">
                        <a href="contacts.html" class="footer-nav__link">Контакты</a>
                    </li>
                    <li class="footer-nav__item">
                        <a href="#" class="footer-nav__link">Политика конфиденциальности</a>
                    </li>
                </ul>
            </nav>
            <p class="site-footer__copyright">© 2026, Магазин «Токийский дрифт»</p>
        </div>
    </footer>

    <script>
        const API_URL = '/products';

        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Ошибка загрузки');
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.error('Ошибка загрузки товаров:', error);
                document.getElementById('product-container').innerHTML = '<p style="color:red;">Не удалось загрузить товары.</p>';
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-container');
            container.innerHTML = '';

            if (products.length === 0) {
                container.innerHTML = '<p>Товаров пока нет.</p>';
                return;
            }

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.dataset.id = product.id;

                const imageDiv = document.createElement('div');
                imageDiv.className = 'product-card__image';
                const img = document.createElement('img');
                img.src = `img/${product.id}.jpg`;
                img.alt = product.name;
                img.className = 'card-img-top card-image';
                imageDiv.appendChild(img);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'product-card__content';

                const title = document.createElement('h3');
                title.className = 'product-card__title';
                title.textContent = product.name;

                const description = document.createElement('p');
                description.className = 'product-card__description';
                description.textContent = product.description;

                const price = document.createElement('p');
                price.className = 'product-card__price';
                price.textContent = `Цена: ${product.price} ₽`;

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'product-card__actions';

                const editBtn = document.createElement('button');
                editBtn.textContent = 'Редактировать';
                editBtn.className = 'edit-btn';
                editBtn.onclick = () => editProduct(product.id);

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Удалить';
                deleteBtn.className = 'delete-btn';
                deleteBtn.onclick = () => deleteProduct(product.id);

                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);

                contentDiv.appendChild(title);
                contentDiv.appendChild(description);
                contentDiv.appendChild(price);
                contentDiv.appendChild(actionsDiv);

                card.appendChild(imageDiv);
                card.appendChild(contentDiv);
                container.appendChild(card);
            });
        }

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const price = parseInt(document.getElementById('price').value);
            const description = document.getElementById('description').value.trim();

            if (!name || isNaN(price) || price <= 0) {
                alert('Пожалуйста, заполните название и корректную цену.');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, description })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Ошибка при добавлении');
                }

                const newProduct = await response.json();
                alert(`Товар "${newProduct.name}" успешно добавлен!`);
                document.getElementById('addProductForm').reset();
                loadProducts();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        });

        async function deleteProduct(id) {
            if (!confirm('Вы уверены, что хотите удалить товар?')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Ошибка при удалении');
                }

                alert('Товар удалён');
                loadProducts();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function editProduct(id) {
            const newName = prompt('Введите новое название (или оставьте пустым, чтобы не менять):');
            const newPriceInput = prompt('Введите новую цену (или оставьте пустым, чтобы не менять):');
            const newDescription = prompt('Введите новое описание (или оставьте пустым):');

            const updates = {};
            if (newName && newName.trim() !== '') updates.name = newName.trim();
            if (newPriceInput && newPriceInput.trim() !== '') {
                const price = parseInt(newPriceInput);
                if (!isNaN(price) && price > 0) updates.price = price;
                else { alert('Некорректная цена'); return; }
            }
            if (newDescription && newDescription.trim() !== '') updates.description = newDescription.trim();

            if (Object.keys(updates).length === 0) {
                alert('Нет данных для обновления');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Ошибка при обновлении');
                }

                alert('Товар обновлён');
                loadProducts();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
